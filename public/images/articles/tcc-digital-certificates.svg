<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Secure digital registry exchange</title>
  <desc id="desc">Two identity records exchange encrypted data through a central web service protected by a digital certificate.</desc>
  <defs>
    <linearGradient id="background" x1="160" y1="60" x2="1440" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121b2f"/>
      <stop offset="1" stop-color="#070b13"/>
    </linearGradient>
    <linearGradient id="shield" x1="675" y1="250" x2="920" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff9b52"/>
      <stop offset="1" stop-color="#f26722"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1d2a43"/>
      <stop offset="1" stop-color="#111a2b"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".38"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#9fb4d8" stroke-opacity=".055"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#background)"/>
  <rect width="1600" height="900" rx="36" fill="url(#grid)"/>
  <circle cx="800" cy="445" r="315" fill="#f97316" opacity=".035"/>
  <circle cx="800" cy="445" r="245" fill="none" stroke="#f97316" stroke-opacity=".11" stroke-width="2" stroke-dasharray="8 18"/>

