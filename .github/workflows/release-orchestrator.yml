name: Release Orchestrator

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  actions: write
  contents: write

jobs:
  validate-release-note:
    name: Validate Release Note
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Validate new release note
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          mapfile -t versions < <(
            git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- CHANGELOG.md \
              | sed -nE 's/^\+## (v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$/\1/p'
          )

          if [ "${#versions[@]}" -ne 1 ]; then
            echo 'CHANGELOG.md must add exactly one release heading in the form ## vMAJOR.MINOR.PATCH.'
            exit 1
          fi

          version="${versions[0]}"
          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "Release tag already exists: $version"
            exit 1
          fi

  prepare-release:
    name: Prepare Release
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      release_notes: ${{ steps.release.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Resolve release details
        id: release
        run: |
          set -euo pipefail

          version=$(sed -nE 's/^## (v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$/\1/p' CHANGELOG.md | head -n 1)
          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo 'CHANGELOG.md must start with a valid release version.'
            exit 1
          fi

          notes=$(awk -v heading="## $version" '
            $0 == heading { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "Release $version must include release notes."
            exit 1
          fi

          delimiter="EOF_$(uuidgen)"
          {
            echo "version=$version"
            echo "release_notes<<$delimiter"
            echo "$notes"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Release
    needs: prepare-release
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      release_notes: ${{ needs.prepare-release.outputs.release_notes }}
    secrets: inherit
