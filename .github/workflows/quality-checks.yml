name: Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - develop
      - 'release/**'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 0'

concurrency:
  group: quality-checks-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-duplicate:
    name: Detect duplicate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.context.outputs.should_run }}
    steps:
      - name: Check for an open pull request
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('should_run', 'true')
              return
            }

            const branch = context.ref.replace('refs/heads/', '')
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            })

            core.setOutput('should_run', String(pullRequests.length === 0))

  quality:
    name: Quality / ${{ matrix.name }}
    needs: detect-duplicate
    if: ${{ needs.detect-duplicate.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            command: yarn lint
          - name: typecheck
            command: yarn typecheck
          - name: build
            command: yarn build
          - name: coverage
            command: yarn test:coverage --reporter=default --reporter=junit --outputFile.junit=vitest-report.xml
            artifact_name: test-coverage
            artifact_path: coverage
            summary_name: Frontend
            test_reporter_path: vitest-report.xml
            coverage_summary_path: coverage/cobertura-coverage.xml
            coverage_html_path: coverage/index.html
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
      - name: Upload coverage report
        if: ${{ always() && matrix.artifact_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: ignore
      - name: Publish test summary
        if: ${{ always() && matrix.summary_name != '' }}
        shell: bash
        env:
          SUMMARY_NAME: ${{ matrix.summary_name }}
          JUNIT_PATH: ${{ matrix.test_reporter_path }}
          COVERAGE_PATH: ${{ matrix.coverage_summary_path }}
          COVERAGE_HTML_PATH: ${{ matrix.coverage_html_path }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: |
          get_attr() {
            local line="$1"
            local attr="$2"

            printf '%s\n' "$line" | sed -n "s/.* ${attr}=\"\([^\"]*\)\".*/\1/p" | head -n 1
          }

          tests='n/a'
          failures='n/a'
          errors='n/a'
          skipped='n/a'
          time='n/a'

          if [ -n "$JUNIT_PATH" ] && [ -f "$JUNIT_PATH" ]; then
            junit_line=$(grep -m 1 -E '<testsuites|<testsuite ' "$JUNIT_PATH" || true)

            if [ -n "$junit_line" ]; then
              tests=$(get_attr "$junit_line" tests)
              failures=$(get_attr "$junit_line" failures)
              errors=$(get_attr "$junit_line" errors)
              skipped=$(get_attr "$junit_line" skipped)
              time=$(get_attr "$junit_line" time)
            fi
          fi

          line_coverage='n/a'
          branch_coverage='n/a'

          if [ -n "$COVERAGE_PATH" ] && [ -f "$COVERAGE_PATH" ]; then
            coverage_line=$(grep -m 1 '<coverage ' "$COVERAGE_PATH" || true)
            line_rate=$(get_attr "$coverage_line" 'line-rate')
            branch_rate=$(get_attr "$coverage_line" 'branch-rate')

            if [ -n "$line_rate" ]; then
              line_coverage=$(awk "BEGIN { printf \"%.2f%%\", $line_rate * 100 }")
            fi

            if [ -n "$branch_rate" ]; then
              branch_coverage=$(awk "BEGIN { printf \"%.2f%%\", $branch_rate * 100 }")
            fi
          fi

          {
            echo "## $SUMMARY_NAME test report"
            echo
            echo '| Metric | Value |'
            echo '| --- | ---: |'
            echo "| Tests | $tests |"
            echo "| Failures | $failures |"
            echo "| Errors | $errors |"
            echo "| Skipped | $skipped |"
            echo "| Duration | ${time}s |"
            echo "| Line coverage | $line_coverage |"
            echo "| Branch coverage | $branch_coverage |"
            echo
            echo "HTML coverage report is available in the \`$ARTIFACT_NAME\` artifact."
            if [ -n "$COVERAGE_HTML_PATH" ] && [ -f "$COVERAGE_HTML_PATH" ]; then
              echo "Entry point: \`$COVERAGE_HTML_PATH\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  terraform:
    name: Terraform
    needs: detect-duplicate
    if: ${{ needs.detect-duplicate.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  quality-jobs:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [detect-duplicate, quality, terraform]
    if: ${{ always() && needs.detect-duplicate.outputs.should_run == 'true' }}
    steps:
      - name: Validate quality results
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TERRAFORM_RESULT: ${{ needs.terraform.result }}
        run: |
          set -euo pipefail

          if [ "$QUALITY_RESULT" != 'success' ] || [ "$TERRAFORM_RESULT" != 'success' ]; then
            echo "Quality result: $QUALITY_RESULT"
            echo "Terraform result: $TERRAFORM_RESULT"
            exit 1
          fi
