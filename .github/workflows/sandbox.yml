name: Deploy Sandbox

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sandbox
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Sandbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          APP_ENV: sandbox
          NEXT_PUBLIC_CONTACT_API_URL: https://sandbox.fbrissi.dev/api/contact
          NEXT_PUBLIC_OG_IMAGE: /images/og/og-image-profile.png
          NEXT_PUBLIC_SITE_URL: https://sandbox.fbrissi.dev
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      - name: Deploy Cloudflare Pages sandbox
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ format('{0}-sandbox', vars.CLOUDFLARE_PAGES_PROJECT_NAME) }}
          directory: out
          branch: sandbox
