name: Release

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.0.0. Defaults to the latest CHANGELOG entry.
        required: false
        type: string
      release_notes:
        description: Release notes. Defaults to the latest CHANGELOG entry.
        required: false
        type: string

permissions:
  actions: write
  contents: write

jobs:
  validate-release-note:
    name: Validate Release Note
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Validate new release note
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          mapfile -t versions < <(
            git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- CHANGELOG.md \
              | sed -nE 's/^\+## (v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$/\1/p'
          )

          if [ "${#versions[@]}" -ne 1 ]; then
            echo 'CHANGELOG.md must add exactly one release heading in the form ## vMAJOR.MINOR.PATCH.'
            exit 1
          fi

          version="${versions[0]}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Semantic Versioning release version: $version"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "Release tag already exists: $version"
            exit 1
          fi

          notes=$(awk -v heading="## $version" '
            $0 == heading { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "Release $version must include release notes."
            exit 1
          fi

  wait-for-infrastructure:
    name: Wait for Infrastructure
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Check whether Terraform changed
        id: terraform
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = 'workflow_dispatch' ]; then
            BASE_SHA='HEAD^'
          fi

          if git diff --quiet "$BASE_SHA" HEAD -- terraform; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi
      - name: Wait for Terraform Cloud apply
        if: ${{ steps.terraform.outputs.changed == 'true' }}
        env:
          COMMIT_SHA: ${{ github.sha }}
          TFC_API_TOKEN: ${{ secrets.TFC_API_TOKEN }}
          TFC_ORGANIZATION: fbrissi
          TFC_WORKSPACE: fbrissi-dev
        run: |
          set -euo pipefail

          api() {
            curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $TFC_API_TOKEN" \
              --header 'Content-Type: application/vnd.api+json' \
              "$@"
          }

          workspace=$(api "https://app.terraform.io/api/v2/organizations/$TFC_ORGANIZATION/workspaces/$TFC_WORKSPACE")
          workspace_id=$(jq --raw-output '.data.id' <<<"$workspace")

          for _ in {1..60}; do
            runs=$(api --get \
              --data-urlencode "search[commit]=$COMMIT_SHA" \
              --data-urlencode 'page[size]=1' \
              "https://app.terraform.io/api/v2/workspaces/$workspace_id/runs")
            run_id=$(jq --raw-output '.data[0].id // empty' <<<"$runs")

            if [ -n "$run_id" ]; then
              break
            fi

            sleep 10
          done

          if [ -z "${run_id:-}" ]; then
            echo "Timed out waiting for Terraform Cloud to start a run for $COMMIT_SHA."
            exit 1
          fi

          while :; do
            run=$(api "https://app.terraform.io/api/v2/runs/$run_id")
            status=$(jq --raw-output '.data.attributes.status' <<<"$run")
            echo "Terraform Cloud run $run_id: $status"

            case "$status" in
              applied|planned_and_finished)
                exit 0
                ;;
              planned|policy_checked|policy_override)
                echo "Terraform Cloud is waiting for manual apply approval."
                ;;
              errored|canceled|force_canceled|discarded|policy_soft_failed)
                echo "Terraform Cloud did not apply the infrastructure."
                exit 1
                ;;
            esac

            sleep 10
          done

  release:
    name: Create Release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    needs: wait-for-infrastructure
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Resolve release details
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version=$(sed -nE 's/^## (v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$/\1/p' CHANGELOG.md | head -n 1)
          fi

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Semantic Versioning release version: $version"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "Release tag already exists: $version"
            exit 1
          fi

          notes="$INPUT_RELEASE_NOTES"
          if [ -z "$notes" ]; then
            notes=$(awk -v heading="## $version" '
              $0 == heading { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md)
          fi

          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "Release $version must include release notes."
            exit 1
          fi

          printf '%s\n' "$notes" > release-notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: gh release create "$VERSION" --title "Release $VERSION" --notes-file release-notes.md
      - name: Deploy release tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: gh workflow run deploy.yml --ref "$VERSION" -f "tag=$VERSION"
