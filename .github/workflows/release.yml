name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release_notes:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example v1.0.0 or 1.0.0.
        required: true
        type: string
      prerelease:
        description: Mark as prerelease.
        required: false
        type: boolean
        default: false
      release_notes:
        description: Optional release notes. Leave empty to generate notes automatically.
        required: false
        type: string

permissions:
  actions: write
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag_exists: ${{ steps.release.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Normalize and validate version
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Semantic Versioning release version: $INPUT_VERSION"
            exit 1
          fi

          version="v$version"
          ref_sha=$(git rev-parse HEAD)
          if tag_sha=$(git rev-parse -q --verify "refs/tags/$version^{}"); then
            if [ "$tag_sha" != "$ref_sha" ]; then
              echo "Release tag $version already points to a different commit."
              exit 1
            fi

            echo 'tag_exists=true' >> "$GITHUB_OUTPUT"
          else
            echo 'tag_exists=false' >> "$GITHUB_OUTPUT"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  wait-for-infrastructure:
    name: Wait for Infrastructure
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check whether the release changes Terraform
        id: terraform
        run: |
          set -euo pipefail

          if ! previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null); then
            echo 'changed=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$previous_tag" HEAD -- terraform; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi
      - name: Wait for Terraform Cloud apply
        if: ${{ steps.terraform.outputs.changed == 'true' }}
        env:
          COMMIT_SHA: ${{ github.sha }}
          TFC_API_TOKEN: ${{ secrets.TFC_API_TOKEN }}
          TFC_ORGANIZATION: fbrissi
          TFC_WORKSPACE: fbrissi-dev
        run: |
          set -euo pipefail

          api() {
            curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $TFC_API_TOKEN" \
              --header 'Content-Type: application/vnd.api+json' \
              "$@"
          }

          workspace=$(api "https://app.terraform.io/api/v2/organizations/$TFC_ORGANIZATION/workspaces/$TFC_WORKSPACE")
          workspace_id=$(jq --raw-output '.data.id' <<<"$workspace")

          for _ in {1..180}; do
            runs=$(api --get \
              --data-urlencode "search[commit]=$COMMIT_SHA" \
              --data-urlencode 'page[size]=1' \
              "https://app.terraform.io/api/v2/workspaces/$workspace_id/runs")
            run_id=$(jq --raw-output '.data[0].id // empty' <<<"$runs")

            if [ -n "$run_id" ]; then
              break
            fi

            sleep 10
          done

          if [ -z "${run_id:-}" ]; then
            echo "Timed out waiting for Terraform Cloud to start a run for $COMMIT_SHA."
            exit 1
          fi

          while :; do
            run=$(api "https://app.terraform.io/api/v2/runs/$run_id")
            status=$(jq --raw-output '.data.attributes.status' <<<"$run")
            echo "Terraform Cloud run $run_id: $status"

            case "$status" in
              applied|planned_and_finished)
                exit 0
                ;;
              planned|policy_checked|policy_override)
                echo "Terraform Cloud is waiting for manual apply approval."
                ;;
              errored|canceled|force_canceled|discarded|policy_soft_failed)
                echo "Terraform Cloud did not apply the infrastructure."
                exit 1
                ;;
            esac

            sleep 10
          done

  release:
    name: Create Release
    needs: [validate, wait-for-infrastructure]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release notes
        env:
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          notes="$INPUT_RELEASE_NOTES"
          if [ -z "$notes" ]; then
            notes=$(awk -v heading="## $VERSION" '
              $0 == heading { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md)
          fi

          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "Release $VERSION must include release notes."
            exit 1
          fi

          printf '%s\n' "$notes" > release-notes.md
      - name: Create and push tag
        if: ${{ needs.validate.outputs.tag_exists != 'true' }}
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            exit 0
          fi

          args=("$VERSION" --title "Release $VERSION" --notes-file release-notes.md)
          if [ "$PRERELEASE" = 'true' ]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
      - name: Deploy release tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: gh workflow run deploy.yml --ref "$VERSION" -f "tag=$VERSION"
