name = "fbrissi-contact-api"
main = "workers/contact-api.ts"
compatibility_date = "2024-01-01"

# The API Worker accepts the browser request and queues the email for the consumer.
routes = [
  { pattern = "fbrissi.dev/api/contact", zone_name = "fbrissi.dev" },
  { pattern = "www.fbrissi.dev/api/contact", zone_name = "fbrissi.dev" }
]

# Environment variables (set via Cloudflare dashboard or Terraform)
# wrangler secret put TURNSTILE_SECRET_KEY

[[queues.producers]]
binding = "CONTACT_FORM_QUEUE"
queue = "fbrissi-contact-form"

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }

# Preview/staging environment
[env.preview]
vars = { ENVIRONMENT = "preview" }

[vars]
ENVIRONMENT = "development"
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"  # Test key (always passes)
